aid: api-video
name: API.Video
description: >-
  api.video is a video infrastructure platform offering APIs for video on
  demand, live streaming, analytics, and AI-powered features including
  transcription and summarization. It provides lightning-fast encoding,
  99.999% uptime, 140+ global points of presence, and SDKs in 20+ languages
  for integrating video into websites, apps, and software.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Analytics
  - CDN
  - Encoding
  - Live Streaming
  - Transcription
  - Video
  - Video on Demand
url: >-
  https://raw.githubusercontent.com/api-evangelist/api-video/refs/heads/main/apis.yml
created: '2025-03-01'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: api-video:video-on-demand
    name: api.video Video On Demand API
    description: >-
      The api.video Video On Demand API enables uploading, encoding, and
      streaming videos with automatic format conversion, thumbnail generation,
      and global CDN delivery. Supports resumable uploads and programmatic
      video management.
    humanURL: https://docs.api.video/reference
    tags:
      - Encoding
      - On Demand
      - Streaming
      - Video
    properties:
      - type: Documentation
        url: https://docs.api.video/reference
      - type: GettingStarted
        url: https://docs.api.video/get-started/start-building
  - aid: api-video:live-streaming
    name: api.video Live Streaming API
    description: >-
      The api.video Live Streaming API enables low-latency live video broadcasts
      with RTMP ingest, automatic recording, and global CDN delivery for
      audiences worldwide.
    humanURL: https://docs.api.video/reference
    tags:
      - Broadcasting
      - Live Streaming
      - RTMP
      - Video
    properties:
      - type: Documentation
        url: https://docs.api.video/reference
  - aid: api-video:analytics
    name: api.video Analytics API
    description: >-
      The api.video Analytics API provides viewer engagement metrics, playback
      statistics, and performance data for both video on demand and live
      streaming content.
    humanURL: https://docs.api.video/reference
    tags:
      - Analytics
      - Engagement
      - Metrics
      - Video
    properties:
      - type: Documentation
        url: https://docs.api.video/reference
